<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Hex Color</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #eef4ff 0%, #f8fbff 100%);
            font-family: Arial, Helvetica, sans-serif;
            color: #1f2937;
            transition: background 0.3s ease;
        }

        .card {
            width: 100%;
            max-width: 620px;
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 14px 32px rgba(15, 23, 42, 0.12);
            padding: 32px;
            text-align: center;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 2rem;
        }

        p {
            margin: 0 0 24px;
            color: #6b7280;
            line-height: 1.6;
        }

        .color-preview {
            width: 100%;
            height: 120px;
            border-radius: 16px;
            border: 1px solid #e5e7eb;
            margin-bottom: 18px;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.35);
        }

        .form-group {
            text-align: left;
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
        }

        textarea {
            width: 100%;
            min-height: 52px;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            resize: none;
            background: #f8fafc;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        textarea:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        button {
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: 700;
            background: #2563eb;
            color: #ffffff;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        button:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.22);
        }

        .hint {
            margin-top: 16px;
            font-size: 0.95rem;
            color: #6b7280;
        }

        @media (max-width: 520px) {
            .card {
                padding: 22px;
            }

            h1 {
                font-size: 1.7rem;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Random Hex Color Generator</h1>
        <p>Generate a new HEX color and apply it to the webpage background.</p>

        <div class="color-preview" id="colorPreview"></div>

        <div class="form-group">
            <label for="hexColorOutput">Current HEX Color</label>
            <textarea id="hexColorOutput" readonly>#FFFFFF</textarea>
        </div>

        <button type="button" onclick="generateColorAndApply()">Generate Color</button>

        <div class="hint">Each click creates a new random background color.</div>
    </main>

    <script>
        // Generate a random HEX color code.
        function generateRandomHexColor() {
            const hexCharacters = '0123456789ABCDEF';
            let hexColor = '#';

            for (let index = 0; index < 6; index++) {
                const randomIndex = Math.floor(Math.random() * hexCharacters.length);
                hexColor += hexCharacters[randomIndex];
            }

            return hexColor;
        }

        // Generate a color, show it, and change the page background.
        function generateColorAndApply() {
            const newColor = generateRandomHexColor();
            const bodyElement = document.body;
            const colorOutput = document.getElementById('hexColorOutput');
            const previewBox = document.getElementById('colorPreview');

            bodyElement.style.background = newColor;
            colorOutput.value = newColor;
            previewBox.style.background = newColor;
        }

        // Set the initial preview color on page load.
        document.getElementById('colorPreview').style.background = '#FFFFFF';
    </script>
</body>
</html>
