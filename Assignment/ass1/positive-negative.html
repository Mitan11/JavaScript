<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positive Negative Zero</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #eef4ff 0%, #f7f9fc 100%);
            color: #1f2937;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
            padding: 32px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        p {
            margin-top: 0;
            margin-bottom: 24px;
            color: #6b7280;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        button {
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            color: #ffffff;
            background: #2563eb;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            margin-top: 6px;
        }

        button:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.22);
        }

        .result-box {
            margin-top: 24px;
            padding: 18px;
            border-radius: 14px;
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            text-align: left;
            min-height: 72px;
        }

        .result-box p {
            margin: 0;
            color: #111827;
            font-size: 1.05rem;
        }

        @media (max-width: 480px) {
            .card {
                padding: 22px;
            }

            h1 {
                font-size: 1.7rem;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Positive, Negative, or Zero</h1>
        <p>Enter a number and check whether it is positive, negative, or zero.</p>

        <div class="form-group">
            <label for="numberInput">Enter Number</label>
            <input type="text" id="numberInput" placeholder="Example: -12">
        </div>

        <button type="button" onclick="checkNumberType()">Check Number</button>

        <div class="result-box" id="resultBox">
            <p>The result will appear here.</p>
        </div>
    </div>

    <script>
        // Validate the input and display the number type.
        function checkNumberType() {
            const inputValue = document.getElementById('numberInput').value.trim();
            const numberValue = Number(inputValue);
            const resultBox = document.getElementById('resultBox');

            if (inputValue === '' || Number.isNaN(numberValue)) {
                resultBox.innerHTML = '<p>Please enter a valid number.</p>';
                return;
            }

            if (numberValue > 0) {
                resultBox.innerHTML = '<p>The number is positive.</p>';
            } else if (numberValue < 0) {
                resultBox.innerHTML = '<p>The number is negative.</p>';
            } else {
                resultBox.innerHTML = '<p>The number is zero.</p>';
            }
        }
    </script>
</body>
</html>
