<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square and Cube</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #eef4ff 0%, #f7f9fc 100%);
            color: #1f2937;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
            padding: 32px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        p {
            margin-top: 0;
            margin-bottom: 24px;
            color: #6b7280;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        .button-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 22px;
        }

        button {
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            color: #ffffff;
            background: #2563eb;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        button:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.22);
        }

        .secondary {
            background: #0f766e;
        }

        .secondary:hover {
            background: #115e59;
        }

        .note {
            margin-top: 18px;
            font-size: 0.95rem;
            color: #6b7280;
        }

        @media (max-width: 480px) {
            .card {
                padding: 22px;
            }

            h1 {
                font-size: 1.7rem;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Square and Cube</h1>
        <p>Enter a number and click a button to find its square or cube.</p>

        <div class="form-group">
            <label for="numberInput">Enter Number</label>
            <input type="text" id="numberInput" placeholder="Example: 5">
        </div>

        <div class="button-row">
            <button type="button" onclick="calculateSquare()">SQUARE</button>
            <button type="button" class="secondary" onclick="calculateCube()">CUBE</button>
        </div>

        <div class="note">The result will be shown in an alert box.</div>
    </div>

    <script>
        // Read the number from the textbox and validate it.
        function getValidNumber() {
            const inputValue = document.getElementById('numberInput').value.trim();
            const numberValue = Number(inputValue);

            if (inputValue === '' || Number.isNaN(numberValue)) {
                alert('Please enter a valid number.');
                return null;
            }

            return numberValue;
        }

        // Calculate and display the square of the entered number.
        function calculateSquare() {
            const numberValue = getValidNumber();
            if (numberValue === null) {
                return;
            }

            const squareValue = numberValue * numberValue;
            alert('Square = ' + squareValue);
        }

        // Calculate and display the cube of the entered number.
        function calculateCube() {
            const numberValue = getValidNumber();
            if (numberValue === null) {
                return;
            }

            const cubeValue = numberValue * numberValue * numberValue;
            alert('Cube = ' + cubeValue);
        }
    </script>
</body>
</html>
